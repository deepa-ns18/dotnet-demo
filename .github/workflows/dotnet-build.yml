name: .NET Console CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify .NET SDK
        run: |
          echo "User: $(whoami)"
          echo "Working Directory: $(pwd)"
          echo "PATH: $PATH"
          which dotnet
          dotnet --info

      - name: Restore application dependencies
        run: dotnet restore dotnet-demo.csproj

      - name: Restore test dependencies
        run: dotnet restore tests/dotnet-demo.Tests/dotnet-demo.Tests.csproj

      - name: Build application
        run: dotnet build dotnet-demo.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test tests/dotnet-demo.Tests/dotnet-demo.Tests.csproj --configuration Release --verbosity minimal --logger "trx;LogFileName=test-results.trx" --results-directory tests/dotnet-demo.Tests/TestResults /p:CollectCoverage=true /p:CoverletOutputFormat=opencover

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/dotnet-demo.Tests/TestResults/**/*.trx

      - name: Run application
        run: dotnet run --project dotnet-demo.csproj --configuration Release --no-build
