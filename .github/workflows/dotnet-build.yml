name: .NET Console CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify .NET SDK
        run: |
          echo "User: $(whoami)"
          echo "Working Directory: $(pwd)"
          echo "PATH: $PATH"
          which dotnet
          dotnet --info

      - name: Restore dependencies
        run: dotnet restore dotnet-demo.csproj

      - name: Build application
        run: dotnet build dotnet-demo.csproj --configuration Release --no-restore

      - name: Run application
        run: dotnet run --project dotnet-demo.csproj --configuration Release --no-build
